version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stock-sniper-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in environment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in environment}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in environment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-sniper-ua:${APP_VERSION:-latest}
    container_name: stock-sniper-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env.production

volumes:
  postgres_data:
    driver: local
